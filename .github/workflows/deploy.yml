# Self-hosted runner on the mini PC. push to main -> prod, push to dev -> dev.
# Deploys from the PERSISTENT clone (~/containers/society-project) which holds the
# gitignored .env files and the named volumes — NOT the runner's throwaway checkout.
name: Deploy
on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy
        run: |
          set -euo pipefail
          REPO="$HOME/containers/society-project"
          BRANCH="${{ github.ref_name }}"
          cd "$REPO"
          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"

          if [ "$BRANCH" = "main" ]; then
            PROJECT=rubric_prod; ENVFILE=deploy/.env.prod
          else
            PROJECT=rubric_dev;  ENVFILE=deploy/.env.dev
          fi

          docker compose --env-file "$ENVFILE" -p "$PROJECT" \
            -f deploy/docker-compose.yml up -d --build --remove-orphans
          docker image prune -f
