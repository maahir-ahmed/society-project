services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: society_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-society_password}
      POSTGRES_DB: society_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U society_user -d society_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - society_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://society_user:${DB_PASSWORD:-society_password}@db:5432/society_platform?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@society.local}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Society Platform}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - society_network

  # Run migrations on startup
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "npx prisma migrate deploy"
    environment:
      DATABASE_URL: postgresql://society_user:${DB_PASSWORD:-society_password}@db:5432/society_platform?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - society_network
    restart: "no"

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  society_network:
    driver: bridge
