# One compose file for both hosted stacks. Pick the stack via --env-file:
#   prod: docker compose --env-file deploy/.env.prod -p rubric_prod -f deploy/docker-compose.yml up -d --build
#   dev:  docker compose --env-file deploy/.env.dev  -p rubric_dev  -f deploy/docker-compose.yml up -d --build
# cloudflared reaches the app via host.docker.internal:${APP_PORT} (matches the existing tunnel setup).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: society_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: society_platform
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U society_user -d society_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # One-off seed. Built from the `builder` stage (has tsx + full deps the runtime image lacks).
  # Run on demand:  docker compose ... --profile seed run --rm seed
  seed:
    build: { context: .., dockerfile: Dockerfile, target: builder }
    command: sh -c "npx tsx prisma/seed.ts"
    environment:
      DATABASE_URL: postgresql://society_user:${DB_PASSWORD}@db:5432/society_platform?schema=public
    depends_on:
      db: { condition: service_healthy }
    networks: [internal]
    restart: "no"
    profiles: ["seed"]

  app:
    build: { context: .., dockerfile: Dockerfile }
    container_name: ${STACK}_app
    restart: unless-stopped
    # Sync schema (idempotent) then start the server — no separate migrate container to clean up.
    # $$ escapes compose interpolation so sh expands the runtime DATABASE_URL.
    # ponytail: db push + --accept-data-loss; ceiling = destructive schema change applies silently.
    # One-time data fixes (e.g. the PrintingStatus enum remap) are applied out-of-band via
    # psql — `prisma db execute` can't run in this image (no CLI shipped; npx-fetched prisma
    # can't load the TS config). db push alone reconciles fresh DBs correctly.
    command: sh -c "npx prisma db push --schema=prisma/schema.prisma --url \"$$DATABASE_URL\" --accept-data-loss && node server.js"
    ports:
      - "${APP_PORT}:3000"   # cloudflared hits host.docker.internal:${APP_PORT}
    environment:
      DATABASE_URL: postgresql://society_user:${DB_PASSWORD}@db:5432/society_platform?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?set NEXTAUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-Society Platform}
      SOCIETY_SLUG: ${SOCIETY_SLUG:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@society.local}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db: { condition: service_healthy }
    networks: [internal]

volumes:
  db_data:
  uploads_data:

networks:
  internal:
