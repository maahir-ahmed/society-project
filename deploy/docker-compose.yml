# One compose file for both hosted stacks. Pick the stack via --env-file:
#   prod: docker compose --env-file deploy/.env.prod -p rubric_prod -f deploy/docker-compose.yml up -d --build
#   dev:  docker compose --env-file deploy/.env.dev  -p rubric_dev  -f deploy/docker-compose.yml up -d --build
# cloudflared reaches the app via host.docker.internal:${APP_PORT} (matches the existing tunnel setup).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: society_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: society_platform
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U society_user -d society_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # Sync schema to the DB on every deploy. This project uses `db push` (no migrations dir).
  # ponytail: db push, switch to `prisma migrate deploy` once you add a migrations history.
  migrate:
    build: { context: .., dockerfile: Dockerfile }
    # $$ escapes compose interpolation so sh expands the container's runtime DATABASE_URL.
    # ponytail: --accept-data-loss keeps unattended deploys from hanging on a prompt;
    # ceiling = a destructive schema change applies silently. Add migrations to remove it.
    command: sh -c "npx prisma db push --schema=prisma/schema.prisma --url \"$$DATABASE_URL\" --accept-data-loss"
    environment:
      DATABASE_URL: postgresql://society_user:${DB_PASSWORD}@db:5432/society_platform?schema=public
    depends_on:
      db: { condition: service_healthy }
    networks: [internal]
    restart: "no"

  app:
    build: { context: .., dockerfile: Dockerfile }
    container_name: ${STACK}_app
    restart: unless-stopped
    ports:
      - "${APP_PORT}:3000"   # cloudflared hits host.docker.internal:${APP_PORT}
    environment:
      DATABASE_URL: postgresql://society_user:${DB_PASSWORD}@db:5432/society_platform?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?set NEXTAUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-Society Platform}
      SOCIETY_SLUG: ${SOCIETY_SLUG:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@society.local}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    networks: [internal]

volumes:
  db_data:
  uploads_data:

networks:
  internal:
